<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - unkvoices</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="app.js"></script>
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo">
      <img id="logo" src="assets/img/logo-white.png" alt="unkvoices logo">
      <span>unkvoices</span>
    </a>
    <nav>
      <a href="beats.html">Beats</a>
      <a href="kits.html">Drum Kits</a>
      <a href="plugins.html">Plugins</a>
      <a href="tutorials.html">Tutoriais</a>
      <a href="contato.html">Contato</a>
      <button id="themeToggle">🌙/☀️</button>
    </nav>
  </header>

  <main class="container">
    <h1>Fale Conosco</h1>
    <div id="contactGrid" class="grid"></div>
  </main>

  <footer class="footer">
    <p>© 2025 unkvoices — feito com foco na música.</p>
  </footer>

  <button id="popupBtn">💬 Mensagem</button>
  <div id="popupForm" class="popup hidden">
    <form id="contactForm" action="https://formspree.io/f/your-form-id" method="POST">
      <h2>Envie sua mensagem</h2>
      <input type="text" name="nome" placeholder="Seu nome" required>
      <input type="email" name="email" placeholder="Seu email" required>
      <textarea name="mensagem" placeholder="Sua mensagem" required></textarea>
      <button type="submit">Enviar</button>
      <button type="button" id="closePopup">Fechar</button>
    </form>
  </div>
</body>
</html>
